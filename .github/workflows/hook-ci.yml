name: Hook CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  hook-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install

      - name: Run hook unit tests
        run: |
          bun test apps/hook/server/__tests__/planStopGuard.test.ts \
            apps/hook/server/__tests__/planLiveHook.test.ts \
            apps/hook/server/__tests__/remotePlanLive.test.ts \
            apps/portal/api/__tests__/hook-review.test.ts \
            packages/editor/__tests__/hookAuth.test.ts

      - name: Smoke test auto target resolver
        run: bun test apps/hook/server/__tests__/remotePlanLive.test.ts --test-name-pattern "auto target uses remote when health is 200"

      - name: Build hook bundle
        run: bun run --cwd apps/hook build
